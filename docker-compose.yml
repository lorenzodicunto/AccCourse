version: "3.8"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: acccourse
      POSTGRES_USER: acccourse
      POSTGRES_PASSWORD: acccourse_dev_2026
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U acccourse"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://acccourse:acccourse_dev_2026@db:5432/acccourse"
      NEXTAUTH_URL: "http://localhost:3000"
      NEXTAUTH_SECRET: "dev-secret-change-in-production"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads:/app/data

volumes:
  pgdata:
  uploads:
